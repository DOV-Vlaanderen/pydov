[bumpversion]
current_version = 4.1.0-dev
commit = True
tag = True
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(-(?P<dev>.*))?
serialize = 
	{major}.{minor}.{patch}-{dev}
	{major}.{minor}.{patch}

[bumpversion:part:dev]
values = 
	""
	dev
	""

[bumpversion:file:setup.py]
search = version='{current_version}'
replace = version='{new_version}'

[bumpversion:file:pydov/__init__.py]
search = __version__ = '{current_version}'
replace = __version__ = '{new_version}'

[flake8]
exclude = docs

[aliases]
test = pytest
